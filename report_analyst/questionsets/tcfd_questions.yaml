name: TCFD Questions
shortcut: tcfd
description: Task Force on Climate-related Financial Disclosures (TCFD) question set for analyzing sustainability reports

questions:
  - id: tcfd_1
    text: "How does the company's board oversee climate-related risks and opportunities?"
    guidelines: |
      - Focus on board-specific oversight activities
      - Look for details about processes and frequency of oversight
      - Consider how carbon emissions are factored into decision-making
      - Evaluate monitoring of progress against goals

  - id: tcfd_2
    text: "What is the role of management in assessing and managing climate-related risks and opportunities?"
    guidelines: |
      - Focus on direct duties related to climate issues
      - Avoid discussing broader corporate risk management systems
      - Look for specific management positions or committees
      - Consider reporting and monitoring processes

  - id: tcfd_3
    text: "What are the most relevant climate-related risks and opportunities that the organisation has identified over the short, medium, and long term? Are risks clearly associated with a horizon?"
    guidelines: |
      - Look for clear timeframe associations
      - Focus on specific risks and opportunities
      - Avoid discussing risk management systems
      - Consider both physical and transition risks

  - id: tcfd_4
    text: "How do climate-related risks and opportunities impact the organisation's businesses strategy, economic and financial performance, and financial planning?"
    guidelines: |
      - Focus on concrete impacts on strategy and performance
      - Look for quantifiable financial impacts
      - Avoid discussing risk identification processes
      - Consider both current and future impacts

  - id: tcfd_5
    text: "How resilient is the organisation's strategy when considering different climate-related scenarios, including a 2°C target or lower scenario? How resilient is the organisation's strategy when considering climate physical risks?"
    guidelines: |
      - Focus on strategy resilience in different scenarios
      - Look for specific scenario analysis details
      - Consider physical risk impacts
      - Avoid discussing risk management processes

  - id: tcfd_6
    text: "What processes does the organisation use to identify and assess climate-related risks?"
    guidelines: |
      - Focus on identification and assessment processes
      - Look for specific methodologies used
      - Consider frequency of assessments
      - Avoid discussing risk management implementation

  - id: tcfd_7
    text: "How does the organisation manage climate-related risks?"
    guidelines: |
      - Focus on specific management actions
      - Look for concrete mitigation strategies
      - Consider integration with business operations
      - Evaluate effectiveness of management approaches

  - id: tcfd_8
    text: "How are the processes for identifying, assessing, and managing climate-related risks integrated into the organisation's overall risk management?"
    guidelines: |
      - Focus on integration with overall risk management
      - Look for specific integration processes
      - Consider governance structures
      - Evaluate effectiveness of integration

  - id: tcfd_9
    text: "What metrics does the organisation use to assess climate-related risks and opportunities? How do the metrics help ensure that the performance is in line with its strategy and risk management process?"
    guidelines: |
      - Focus on specific metrics used
      - Look for alignment with strategy
      - Consider data quality and coverage
      - Avoid discussing general risk assessment methods

  - id: tcfd_10
    text: "Does the organisation disclose its Scope 1, Scope 2, and, if appropriate, Scope 3 greenhouse gas (GHG) emissions? What are the related risks, and do they differ depending on the scope?"
    guidelines: |
      - Focus on emissions disclosure completeness
      - Look for specific emissions data
      - Consider scope-specific risks
      - Evaluate calculation methodologies

  - id: tcfd_11
    text: "What targets does the organisation use to understand/quantify/benchmark climate-related risks and opportunities? How is the organization performing against these targets?"
    guidelines: |
      - Focus on specific targets and benchmarks
      - Look for performance tracking
      - Consider target ambition levels
      - Avoid discussing general risk assessment methods

analysis_guidelines: |
  - Responses must be precise and grounded in report extracts
  - Acknowledge uncertainty rather than making assumptions
  - Consider potential greenwashing and cheap talk
  - Scrutinize quantifiable data vs vague statements
  - Maintain a critical analytical tone
  - Acknowledge information represents company's perspective
  - Evaluate completeness and quality of disclosures 