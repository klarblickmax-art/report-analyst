name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpoppler-cpp-dev pkg-config
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Set up environment variables
      run: |
        echo "OPENAI_API_KEY=test_key" >> $GITHUB_ENV
        echo "GOOGLE_API_KEY=test_key" >> $GITHUB_ENV
        echo "QUESTIONSETS_PATH=report_analyst/questionsets" >> $GITHUB_ENV
    
    - name: Create directories
      run: |
        mkdir -p temp
        mkdir -p data/cache
        mkdir -p storage/cache
        mkdir -p storage/llm_cache
    
    - name: Test imports
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        
        # Test core imports
        try:
            from report_analyst.core.question_loader import get_question_loader
            print('✅ Question loader imports successfully')
        except Exception as e:
            print(f'❌ Question loader import failed: {e}')
            sys.exit(1)
        
        # Test question loader functionality
        try:
            loader = get_question_loader()
            question_sets = loader.get_question_sets()
            print(f'✅ Loaded {len(question_sets)} question sets')
        except Exception as e:
            print(f'❌ Question loader functionality failed: {e}')
            sys.exit(1)
        
        # Test streamlit app import
        try:
            import report_analyst.streamlit_app
            print('✅ Streamlit app imports successfully')
        except Exception as e:
            print(f'❌ Streamlit app import failed: {e}')
            sys.exit(1)
        
        # Test API imports
        try:
            import report_analyst_api.main
            print('✅ API imports successfully')
        except Exception as e:
            print(f'❌ API import failed: {e}')
            sys.exit(1)
        
        print('✅ All imports successful!')
        "
    
    - name: Run all tests
      run: |
        PYTHONPATH=. pytest tests/ -v --cov=report_analyst --cov-report=xml --cov-report=term-missing --tb=short
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install linting dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort mypy
    
    - name: Run black (code formatting check)
      run: |
        black --check --diff .
    
    - name: Run isort (import sorting check)
      run: |
        isort --check-only --diff .
    
    - name: Run flake8 (linting)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run mypy (type checking)
      run: |
        mypy report_analyst/ --ignore-missing-imports || true

  security:
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install security dependencies
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Run safety check
      run: |
        safety check --json || true
    
    - name: Run bandit security scan
      run: |
        bandit -r report_analyst/ -f json -o bandit-report.json || true