[tool.isort]
profile = "black"
line_length = 127
skip = [".git", ".hg", "venv", "venv2", "node_modules", "__pycache__"]

[tool.black]
line-length = 127
target-version = ['py38', 'py39', 'py310', 'py311', 'py312']
exclude = '''
/(
    \.git
    | \.hg
    | venv
    | venv2
    | node_modules
    | __pycache__
)/
'''
